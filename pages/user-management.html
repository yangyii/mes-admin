<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户管理 - MES管理系统</title>
<link rel="stylesheet" href="../assets/base/index.css">
<style>
  /* Module page specific: full height, no sidebar offset */
  html, body {
    height: 100%;
    background: #f0f2f5;
  }
  .module-content {
    display: block !important;
    padding: 20px;
    height: 100%;
    overflow-y: auto;
  }
</style>
</head>
<body>
<div class="module-content">

        <div class="split-layout">
          <div class="split-left">
            <div class="split-left-header">
              <div class="split-left-title">组织架构</div>
            </div>
            <div class="split-left-body" id="userOrgTreeContainer"></div>
          </div>
          <div class="split-right">
            <div class="split-right-header">
              <div class="split-right-title" id="userRightTitle">全部用户</div>
            </div>
            <div class="split-right-body" style="padding:0 24px 20px;">
              <div class="search-toolbar">
                <input type="text" class="form-input-sm" id="userSearchName" placeholder="用户名称" oninput="searchUserData()">
                <input type="text" class="form-input-sm" id="userSearchPhone" placeholder="手机号码" oninput="searchUserData()">
                <select id="userSearchStatus" onchange="searchUserData()" style="padding:7px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;">
                  <option value="">全部状态</option>
                  <option value="在职">在职</option>
                  <option value="离职">离职</option>
                </select>
                <button class="btn-sm btn-sm-primary" onclick="searchUserData()">搜索</button>
                <button class="btn-sm btn-sm-secondary" onclick="resetUserSearch()">重置</button>
                <span style="flex:1;"></span>
                <button class="btn-sm btn-sm-primary" onclick="openUserModal()">+ 新增用户</button>
              </div>
              <div style="overflow-x:auto;">
                <table>
                  <thead><tr>
                    <th style="width:100px;">用户名称</th>
                    <th style="width:120px;">用户昵称</th>
                    <th style="width:120px;">部门</th>
                    <th style="width:100px;">岗位</th>
                    <th style="width:100px;">工序</th>
                    <th style="width:140px;">手机号码</th>
                    <th style="width:60px;">状态</th>
                    <th style="width:120px;">用户权限</th>
                    <th style="width:160px;">创建时间</th>
                    <th style="width:180px;">操作</th>
                  </tr></thead>
                  <tbody id="userTableBody"></tbody>
                </table>
              </div>
              <div class="pagination" id="userPagination">
                <div class="pagination-info" id="userPageInfo">共 0 条</div>
                <div class="pagination-controls" id="userPageCtrl"></div>
              </div>
            </div>
          </div>
        </div>
      
</div>


<div class="modal-overlay" id="userModal">
  <div class="modal" style="width: 600px; max-width: 95%;">
    <div class="modal-header">
      <div class="modal-title" id="userModalTitle">新增用户</div>
      <button class="modal-close" onclick="closeUserModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-form-group">
        <label>用户名称 <span style="color:#ef4444">*</span></label>
        <input type="text" id="userName" placeholder="请输入用户名称">
      </div>
      <div class="modal-form-group">
        <label>用户昵称</label>
        <input type="text" id="userNick" placeholder="请输入用户昵称">
      </div>
      <div class="modal-form-group">
        <label>所属部门 <span style="color:#ef4444">*</span></label>
        <select id="userDept" onchange="onUserDeptChange()">
          <option value="">请选择部门</option>
        </select>
      </div>
      <div class="modal-form-group">
        <label>所属岗位</label>
        <select id="userPosition">
          <option value="">请先选择岗位</option>
        </select>
      </div>
      <div class="modal-form-group" id="userProcessGroup" style="display:none;">
        <label>负责工序 <span style="color:#999;font-weight:normal;">（多选）</span></label>
        <div id="userProcessCheckboxes" style="max-height:160px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;">
          <!-- 工序复选框动态生成 -->
        </div>
      </div>
      <div class="modal-form-group">
        <label>手机号码 <span style="color:#ef4444">*</span></label>
        <input type="text" id="userPhone" placeholder="请输入手机号码">
      </div>
      <div class="modal-form-group">
        <label>邮箱</label>
        <input type="text" id="userEmail" placeholder="请输入邮箱">
      </div>
      <div class="modal-form-group">
        <label>入职日期 <span style="color:#ef4444">*</span></label>
        <input type="date" id="userJoinDate">
      </div>
      <div class="modal-form-group">
        <label>状态</label>
        <select id="userStatus">
          <option value="在职">在职</option>
          <option value="离职">离职</option>
        </select>
      </div>
      <div class="modal-form-group">
        <label>用户权限</label>
        <div id="userRolesCheckboxes">
          <!-- 角色复选框将通过JavaScript动态生成 -->
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeUserModal()">取消</button>
      <button class="btn btn-primary" onclick="saveUser()">确定</button>
    </div>
  </div>
</div>


<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 删除确认模态框 -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="modal-body">
      <div class="delete-confirm-icon">
        <svg viewBox="0 0 24 24" width="40" height="40" fill="#ef4444"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/></svg>
      </div>
      <div class="delete-confirm-text">确定要删除吗？</div>
      <div class="delete-confirm-hint" id="deleteConfirmHint">此操作不可恢复</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeDeleteModal()">取消</button>
      <button class="btn btn-danger" onclick="confirmDelete()">确定删除</button>
    </div>
  </div>
</div>

<script src="../assets/base/data.js"></script>
<script src="../assets/base/index.js"></script>

<script src="../assets/process/data.js"></script>
<script src="../assets/role-permission/data.js"></script>

<script src="../assets/user-management/data.js"></script>
<script src="../assets/user-management/index.js"></script>
<script>
  // Initialize module on load
  renderUserOrgTree();
</script>
</body>
</html>
