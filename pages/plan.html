<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>计划管理 - MES管理系统</title>
<link rel="stylesheet" href="../assets/base/index.css">
<style>
  /* Module page specific: full height, no sidebar offset */
  html, body {
    height: 100%;
    background: #f0f2f5;
  }
  .module-content {
    display: block !important;
    padding: 20px;
    height: 100%;
    overflow-y: auto;
  }
</style>
</head>
<body>
<div class="module-content">

        <div class="table-container">
          <div class="table-header">
            <div class="table-title">生产订单(来自ERP)</div>
            <div class="table-actions">
              <input type="text" id="planSearchInput" placeholder="搜索ERP订单号/图号..." oninput="searchPlanData()" style="padding: 10px 16px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; margin-right: 12px; width: 260px; outline: none;">
              <select id="planStatusFilter" onchange="searchPlanData()" style="padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; margin-right: 12px; outline: none; background: #fff; color: #334155;">
                <option value="">全部状态</option>
                <option value="进行中">进行中</option>
                <option value="已完成">已完成</option>
                <option value="已取消">已取消</option>
              </select>
              <button class="btn btn-secondary">导出</button>
              <button class="btn btn-primary">同步ERP</button>
            </div>
          </div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th style="width:60px;min-width:60px;text-align:center;">序号</th>
                  <th>生产订单号</th>
                  <th>ERP订单号</th>
                  <th>图号</th>
                  <th>产品名称</th>
                  <th>优先级</th>
                  <th>计划数量</th>
                  <th>完成数量</th>
                  <th>报废数量</th>
                  <th>完成率</th>
                  <th>状态</th>
                  <th>最新同步时间</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="planTableBody"></tbody>
            </table>
          </div>
          <div class="pagination">
            <div class="pagination-info" id="planPaginationInfo">共 0 条</div>
            <div class="pagination-controls">
              <button class="pagination-btn" id="planPrevBtn" onclick="goPlanPage('prev')">‹</button>
              <span id="planPaginationBtns"></span>
              <button class="pagination-btn" id="planNextBtn" onclick="goPlanPage('next')">›</button>
              <select class="pagination-size" id="planPageSize" onchange="changePlanPageSize(this.value)">
                <option value="10">10条/页</option>
                <option value="20">20条/页</option>
                <option value="50">50条/页</option>
              </select>
            </div>
          </div>
        </div>
      
</div>


<div class="modal-overlay" id="planReportRelationModal">
  <div class="modal" style="width: 1100px; max-width: 95%;">
    <div class="modal-header">
      <div class="modal-title" id="relationModalTitle">计划与报工关联</div>
      <button class="modal-close" onclick="closeRelationModal()">×</button>
    </div>
    <div class="modal-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
        <!-- 左侧:计划订单信息 -->
        <div>
          <div style="margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #e2e8f0;">
            <div style="font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:8px;">生产订单信息</div>
            <div id="relationPlanInfo"></div>
          </div>
        <div>
          <div style="margin-bottom:16px;">
            <div style="font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:8px;">系统自动同步明细</div>
            <div style="font-size:12px;color:#64748b;margin-bottom:8px;">自动拆分的报工明细,实现多对多关系</div>
          </div>
          <div class="table-wrapper" style="max-height:480px;overflow-y:auto;overflow-x:auto;">
            <table style="font-size:13px;">
              <thead>
                <tr>
                  <th>报工ID</th>
                  <th>图号</th>
                  <th>工序</th>
                  <th>合格数量</th>
                  <th>报废数量</th>
                  <th>良率</th>
                  <th>报工时间</th>
                  <th>同步状态</th>
                  <th>同步时间</th>
                </tr>
              </thead>
              <tbody id="relationDetailTable"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeRelationModal()">关闭</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="manualRelationModal">
  <div class="modal" style="width: 900px; max-width: 95%;">
    <div class="modal-header">
      <div class="modal-title" id="manualRelationTitle">人工关联计划</div>
      <button class="modal-close" onclick="closeManualRelationModal()">×</button>
    </div>
    <div class="modal-body">
      <div style="margin-bottom: 20px; padding: 15px; background-color: #f0f9ff; border-radius: 8px; border-left: 4px solid #0ea5e9;">
        <div style="font-size: 14px; color: #0369a1;">
          <strong>当前记录:</strong> <span id="manualRelationRecord"></span><br>
          <strong>图号:</strong> <span id="manualRelationDrawingNo"></span>
        </div>
      </div>

      <div id="quantityInfo" style="margin-bottom: 16px; padding: 12px; background-color: #fef3c7; border-radius: 6px; border-left: 4px solid #f59e0b; display: none;">
        <div style="font-size: 13px; color: #92400e;">
          <strong>数量校验:</strong><br>
          <span id="quantityDetail"></span>
        </div>
      </div>

      <div style="margin-bottom: 16px;">
        <div style="font-size: 16px; font-weight: 700; color: #1a1a1a; margin-bottom: 12px;" id="relationListTitle">
          可关联的生产订单（相同图号）
        </div>
        <div class="table-wrapper" style="max-height: 400px; overflow-y: auto; overflow-x: auto;">
          <table style="font-size: 13px;">
            <thead>
              <tr>
                <th style="width: 50px;">
                  <input type="checkbox" id="selectAllPlans" onchange="toggleSelectAllPlans(this)">
                </th>
                <th>生产订单号</th>
                <th>ERP订单</th>
                <th>图号</th>
                <th>产品名称</th>
                <th>计划数量</th>
                <th>完成数量</th>
                <th>状态</th>
              </tr>
            </thead>
            <tbody id="availablePlansTable"></tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeManualRelationModal()">取消</button>
      <button class="btn btn-primary" onclick="confirmManualRelation()">确认关联</button>
    </div>
  </div>
</div>


<!-- Toast -->
<div class="toast" id="toast"></div>
<script src="../assets/base/data.js"></script>
<script src="../assets/base/index.js"></script>

<script src="../assets/plan/data.js"></script>
<script src="../assets/plan/index.js"></script>
<script>
  // Initialize module on load
  renderPlanTable();
</script>
</body>
</html>
