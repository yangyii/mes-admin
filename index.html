<div class="toast" id="toast"></div>

<script>
// ==================== 登录状态管理 ====================
const AUTH_KEY = 'mes_admin_auth';
const REMEMBER_KEY = 'mes_admin_remember';

// 检查登录状态
function checkAuth() {
  const authData = localStorage.getItem(AUTH_KEY);
  if (authData) {
    try {
      const auth = JSON.parse(authData);
      // 检查是否过期（可选，这里设置为7天）
      if (auth.expireTime && Date.now() < auth.expireTime) {
        return auth;
      } else if (!auth.expireTime) {
        // 兼容旧数据
        return auth;
      }
    } catch (e) {
      localStorage.removeItem(AUTH_KEY);
    }
  }
  return null;
}

// 保存登录状态
function saveAuth(username, remember = false) {
  const authData = {
    username: username,
    loginTime: Date.now(),
    expireTime: Date.now() + 7 * 24 * 60 * 60 * 1000 // 7天后过期
  };
  localStorage.setItem(AUTH_KEY, JSON.stringify(authData));

  // 如果勾选记住我，保存用户名和密码
  if (remember) {
    const rememberData = {
      username: document.getElementById('loginUsername').value,
      password: document.getElementById('loginPassword').value
    };
    localStorage.setItem(REMEMBER_KEY, JSON.stringify(rememberData));
  } else {
    // 如果没有勾选记住我，清除之前保存的密码
    localStorage.removeItem(REMEMBER_KEY);
  }
}

// 清除登录状态
function clearAuth() {
  localStorage.removeItem(AUTH_KEY);
  // 注意：不清除REMEMBER_KEY，让用户决定是否记住密码
}

// 获取记住的登录信息
function getRememberedLogin() {
  const data = localStorage.getItem(REMEMBER_KEY);
  if (data) {
    try {
      return JSON.parse(data);
    } catch (e) {
      return null;
    }
  }
  return null;
}

// 自动登录
function autoLogin(auth) {
  document.getElementById('loginContainer').style.display = 'none';
  document.getElementById('adminContainer').classList.add('active');
  document.getElementById('currentUserName').textContent = auth.username;
  showToast('欢迎回来，' + auth.username + '！');
}

// 填充记住的登录信息
function fillRememberedLogin() {
  const remembered = getRememberedLogin();
  if (remembered) {
    document.getElementById('loginUsername').value = remembered.username || '';
    document.getElementById('loginPassword').value = remembered.password || '';
    document.getElementById('rememberMe').checked = true;
  }
}

// 页面加载时检查
window.addEventListener('DOMContentLoaded', function() {
  const auth = checkAuth();
  if (auth) {
    autoLogin(auth);
  } else {
    fillRememberedLogin();
  }
});

// Module titles
const moduleTitles = {
  'dashboard': '工作台',
  'plan': '计划管理',
  'report-receive': '来料接收',
  'report-complete': '完工汇报',
  'report-transfer': '移交下道',
  'equipment': '设备管理',
  'product': '产品管理',
  'process': '工序管理',
  'user-management': '用户管理',
  'organization': '组织架构',
  'role-permission': '角色权限',
  'factory-modeling': '工厂建模',
  'system-log': '操作日志',
  'log': '报工修改日志',
  'process-report': '报工报表'
};

// Login
function handleLogin() {
  const username = document.getElementById('loginUsername').value;
  const password = document.getElementById('loginPassword').value;
  const remember = document.getElementById('rememberMe').checked;

  if (!username || !password) { showToast('请输入用户名和密码'); return; }
  if (username === 'admin' && password === '123456') {
    // 保存登录状态
    saveAuth(username, remember);

    document.getElementById('loginContainer').style.display = 'none';
    document.getElementById('adminContainer').classList.add('active');
    document.getElementById('currentUserName').textContent = username;
    showToast('登录成功，欢迎回来！');
  } else {
    showToast('用户名或密码错误');
  }
}

function handleLogout() {
  if (confirm('确定要退出登录吗？')) {
    // 清除登录状态
    clearAuth();

    document.getElementById('adminContainer').classList.remove('active');
    document.getElementById('loginContainer').style.display = 'flex';

    // 检查是否有记住的登录信息
    fillRememberedLogin();

    showToast('已退出登录');
  }
}

// Switch module - load page in iframe
function switchModule(module) {
  // Update menu
  document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
  const menuEl = document.getElementById('menu-' + module);
  if (menuEl) menuEl.classList.add('active');

  // Update title
  document.getElementById('pageTitle').textContent = moduleTitles[module] || module;

  // Load page in iframe
  document.getElementById('mainFrame').src = 'pages/' + module + '.html';
}

// Toast
function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}
</script>
